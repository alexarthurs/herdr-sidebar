name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: build + test + clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/herdr-aa-sidebar
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: plugins/herdr-aa-sidebar
      - run: cargo build --release
      - run: cargo test
      - run: cargo clippy --release -- -D warnings
