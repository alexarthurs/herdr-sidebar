# Manifest for herdr-sidebar — the VS Code sidebar for herdr: file explorer
# and source control in one plugin (one pane by default, separated panes on
# request via the ⚙ settings).
#
# Cross-platform notes (verified against herdr 0.7.1; see CLAUDE.md for the
# full findings list):
#  - Action ids must be GLOBALLY unique across platforms, so Windows launchers
#    use `-windows`-suffixed ids; both variants gate with the item-level
#    `platforms` key.
#  - herdr can NOT spawn a relative [[panes]] command on Windows — it resolves
#    the program against herdr's own directory (ERROR_PATH_NOT_FOUND) and
#    reports the plugin root as a `\\?\` verbatim path. Windows launches go
#    through wscript → the GUI-subsystem ensure sidecar → the socket API
#    (any console in a hook chain flashes a Windows Terminal window per focus
#    event on Windows 11). The [[panes]] entry below serves linux/macos only.
#  - Launchers dock the sidebar on the LEFT edge of the tab: `pane split` only
#    goes right/down, so they split the leftmost pane and `pane swap` the new
#    pane into the left slot.

id = "herdr-sidebar"
name = "herdr-sidebar"
version = "0.5.2"
description = "VS Code-style sidebar: file explorer + source control (with ✧ AI commit messages) in one herdr pane."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos", "windows"]

[[build]]
command = ["cargo", "build", "--release"]

# Declarative pane entry — usable on linux/macos (`plugin pane open`) and as
# the unix launcher's fallback. No Windows [[panes]] entry: the relative
# command is unspawnable there.
[[panes]]
id = "sidebar"
title = "Sidebar"
placement = "split"
command = ["./target/release/herdr-sidebar"]

# Toggle the sidebar: open left-docked / focus if unfocused / close if focused.
[[actions]]
id = "open-sidebar"
platforms = ["linux", "macos"]
title = "Toggle sidebar"
description = "Open the sidebar docked on the left (focus it if open; close it if focused)."
command = ["bash", "scripts/open-sidebar.sh"]

[[actions]]
id = "open-sidebar-windows"
platforms = ["windows"]
title = "Toggle sidebar"
description = "Open the sidebar docked on the left (focus it if open; close it if focused)."
command = ["wscript", "//B", "scripts/launch-ensure.vbs", "--toggle"]

# Separated-panels mode: open the Source Control pane on its own (the ⚙
# settings' "Unified sidebar: off"). The explorer side is what the sidebar
# opens by default.
[[actions]]
id = "open-git"
platforms = ["linux", "macos"]
title = "Toggle source control"
description = "Open a separate Source Control pane (focus it if open; close it if focused)."
command = ["bash", "scripts/open-git.sh"]

[[actions]]
id = "open-git-windows"
platforms = ["windows"]
title = "Toggle source control"
description = "Open a separate Source Control pane (focus it if open; close it if focused)."
command = [
  "powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command",
  '''$u=New-Object System.Text.UTF8Encoding($false); [Console]::OutputEncoding=$u; $OutputEncoding=$u; $b=$env:HERDR_BIN_PATH; if(-not $b){$b='herdr'}; $p=((& $b plugin list --json|ConvertFrom-Json).result.plugins|?{$_.plugin_id -eq 'herdr-sidebar'}).plugin_root; if($p -and $p.StartsWith('\\?\')){$p=$p.Substring(4)}; & (Join-Path (Join-Path $p 'scripts') 'open-git.ps1')''',
]

# Refresh every workspace onto the latest builds after a rebuild.
[[actions]]
id = "redeploy"
platforms = ["linux", "macos"]
title = "Redeploy sidebar panes"
description = "Close all sidebar panes in every workspace so they respawn on the latest build."
command = ["bash", "scripts/redeploy.sh"]

[[actions]]
id = "redeploy-windows"
platforms = ["windows"]
title = "Redeploy sidebar panes"
description = "Close all sidebar panes in every workspace so they respawn on the latest build."
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/redeploy.ps1"]

# Sidebar mode: on every tab/workspace focus, quietly ensure the focused tab
# has a left-docked sidebar (idempotent, never steals focus). A tab hooked at
# first focus still has its single full-height pane, so the sidebar becomes a
# full-height left column that later splits can't shorten.
# tab.created / workspace.created fire when a restarted server RESTORES its
# session — the resumed tab is already focused, so no focus TRANSITION (and
# no tab.focused/workspace.focused) ever happens, which used to leave dead
# resumed sidebars (label + scrollback survive a restart; the process and
# metadata tokens do not) sitting unhealed until the user switched tabs.
# pane.focused heals resumed corpses the moment the user interacts with the
# restored session (client attach emits no tab/workspace events at all).
# Hooking pane.* from a pane-creating script is only safe because open()
# holds its lock until the spawned TUI stamps its token — queued invocations
# then observe a LIVE pane and no-op instead of replace-looping.
[[events]]
on = "pane.focused"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-sidebar.sh"]

[[events]]
on = "pane.focused"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]

[[events]]
on = "tab.created"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-sidebar.sh"]

[[events]]
on = "tab.created"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]

[[events]]
on = "workspace.created"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-sidebar.sh"]

[[events]]
on = "workspace.created"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]

[[events]]
on = "tab.focused"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-sidebar.sh"]

[[events]]
on = "workspace.focused"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-sidebar.sh"]

[[events]]
on = "tab.focused"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]

[[events]]
on = "workspace.focused"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]
