# Manifest for herdr-aa-filetree — VS Code-style Explorer pane for herdr.
#
# Cross-platform notes (inherited from herdr-file-viewer's verified findings, herdr 0.7.1):
#  - Action ids must be GLOBALLY unique across platforms, so the Windows launcher uses the
#    `-windows`-suffixed id; both variants are gated with the item-level `platforms` key.
#  - herdr can NOT spawn a relative [[panes]] command on Windows — it resolves the program
#    against herdr's own directory and fails with ERROR_PATH_NOT_FOUND, and it reports the
#    plugin root as a `\\?\` verbatim path. The Windows action therefore locates the plugin
#    root via `herdr plugin list --json` (stripping `\\?\`) and runs scripts/open-explorer.ps1,
#    which spawns the binary BY ABSOLUTE PATH (`pane split` + `pane run`). The [[panes]] entry
#    below serves linux/macos only.
#  - Both launchers dock the explorer on the LEFT edge of the tab (beside the spaces/agents
#    sidebar): `pane split` only goes right/down, so they split the leftmost pane and
#    `pane swap` the new pane into the left slot. See the scripts for details.

id = "herdr-aa-filetree"
name = "herdr-aa-filetree"
version = "0.1.0"
description = "VS Code-style file explorer: a left-docked tree view of the workspace in a herdr pane."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos", "windows"]

[[build]]
command = ["cargo", "build", "--release"]

# Declarative pane entry — usable on linux/macos (`plugin pane open`) and as the unix
# launcher's fallback. No Windows [[panes]] entry: the relative command is unspawnable there.
[[panes]]
id = "filetree"
title = "Explorer"
placement = "split"
command = ["./target/release/herdr-aa-filetree"]

# Toggle the explorer: open left-docked / focus if unfocused / close if focused.
[[actions]]
id = "open-explorer"
platforms = ["linux", "macos"]
title = "Toggle explorer"
description = "Open the file explorer docked on the left (focus it if open; close it if focused)."
command = ["bash", "scripts/open-explorer.sh"]

# Sidebar mode: on every tab/workspace focus, quietly ensure the focused tab has
# a left-docked Explorer (idempotent, never steals focus — see ensure-explorer.*).
# A tab hooked at first focus still has its single full-height pane, so the
# explorer becomes a full-height left column that later splits can't shorten.
[[events]]
on = "tab.focused"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-explorer.sh"]

[[events]]
on = "workspace.focused"
platforms = ["linux", "macos"]
command = ["bash", "scripts/ensure-explorer.sh"]

# Windows hooks go through wscript (GUI subsystem, PATH-resolvable) into the
# GUI-subsystem ensure sidecar, which talks to herdr's socket directly. A
# console anywhere in this chain (powershell, cmd, the herdr CLI) briefly
# flashes a Windows Terminal window PER PROCESS on every focus event on
# Windows 11 — even under CREATE_NO_WINDOW (verified live). Hook commands run
# with cwd = plugin root, so the relative .vbs argument resolves.
[[events]]
on = "tab.focused"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]

[[events]]
on = "workspace.focused"
platforms = ["windows"]
command = ["wscript", "//B", "scripts/launch-ensure.vbs"]

[[actions]]
id = "open-explorer-windows"
platforms = ["windows"]
title = "Toggle explorer"
description = "Open the file explorer docked on the left (focus it if open; close it if focused)."
# Same console-free chain as the hooks; --toggle turns the quiet ensure into
# the open/focus/close toggle.
command = ["wscript", "//B", "scripts/launch-ensure.vbs", "--toggle"]

# Refresh every workspace onto the latest builds: closes all herdr-aa panes
# everywhere (stale panes block the ensure hook's re-dock) and kills straggler
# processes; hooks re-dock fresh panes on each workspace's next focus. Run
# after rebuilding either plugin.
[[actions]]
id = "redeploy"
platforms = ["linux", "macos"]
title = "Redeploy plugin panes"
description = "Close all plugin panes in every workspace so they respawn on the latest builds."
command = ["bash", "scripts/redeploy.sh"]

[[actions]]
id = "redeploy-windows"
platforms = ["windows"]
title = "Redeploy plugin panes"
description = "Close all plugin panes in every workspace so they respawn on the latest builds."
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/redeploy.ps1"]
