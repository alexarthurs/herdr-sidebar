# Manifest for herdr-aa-filetree.
#
# NOTE (Windows): herdr cannot spawn a relative [[panes]] command on Windows — see
# CLAUDE.md at the repo root and herdr-file-viewer's manifest for the launcher-script
# pattern. The relative [[panes]] entry below serves linux/macos; Windows launch
# support gets its own [[actions]] once the plugin does something.

id = "herdr-aa-filetree"
name = "herdr-aa-filetree"
version = "0.1.0"
description = "VS Code-style file explorer: a tree view of the workspace repo in a herdr split pane."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos", "windows"]

[[build]]
command = ["cargo", "build", "--release"]

[[panes]]
id = "filetree"
title = "Explorer"
placement = "split"
command = ["./target/release/herdr-aa-filetree"]
