# Manifest for herdr-aa-filetree — VS Code-style Explorer pane for herdr.
#
# Cross-platform notes (inherited from herdr-file-viewer's verified findings, herdr 0.7.1):
#  - Action ids must be GLOBALLY unique across platforms, so the Windows launcher uses the
#    `-windows`-suffixed id; both variants are gated with the item-level `platforms` key.
#  - herdr can NOT spawn a relative [[panes]] command on Windows — it resolves the program
#    against herdr's own directory and fails with ERROR_PATH_NOT_FOUND, and it reports the
#    plugin root as a `\\?\` verbatim path. The Windows action therefore locates the plugin
#    root via `herdr plugin list --json` (stripping `\\?\`) and runs scripts/open-explorer.ps1,
#    which spawns the binary BY ABSOLUTE PATH (`pane split` + `pane run`). The [[panes]] entry
#    below serves linux/macos only.
#  - Both launchers dock the explorer on the LEFT edge of the tab (beside the spaces/agents
#    sidebar): `pane split` only goes right/down, so they split the leftmost pane and
#    `pane swap` the new pane into the left slot. See the scripts for details.

id = "herdr-aa-filetree"
name = "herdr-aa-filetree"
version = "0.1.0"
description = "VS Code-style file explorer: a left-docked tree view of the workspace in a herdr pane."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos", "windows"]

[[build]]
command = ["cargo", "build", "--release"]

# Declarative pane entry — usable on linux/macos (`plugin pane open`) and as the unix
# launcher's fallback. No Windows [[panes]] entry: the relative command is unspawnable there.
[[panes]]
id = "filetree"
title = "Explorer"
placement = "split"
command = ["./target/release/herdr-aa-filetree"]

# Toggle the explorer: open left-docked / focus if unfocused / close if focused.
[[actions]]
id = "open-explorer"
platforms = ["linux", "macos"]
title = "Toggle explorer"
description = "Open the file explorer docked on the left (focus it if open; close it if focused)."
command = ["bash", "scripts/open-explorer.sh"]

[[actions]]
id = "open-explorer-windows"
platforms = ["windows"]
title = "Toggle explorer"
description = "Open the file explorer docked on the left (focus it if open; close it if focused)."
# Locate the launcher by asking herdr for its own plugin root (the action's cwd is unreliable
# on Windows), forcing UTF-8 before parsing that JSON, stripping the `\\?\` verbatim prefix
# herdr reports, then run the .ps1 by absolute path. PowerShell 5.1: chain with `;`, never `&&`.
command = [
  "powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command",
  '''$u=New-Object System.Text.UTF8Encoding($false); [Console]::OutputEncoding=$u; $OutputEncoding=$u; $b=$env:HERDR_BIN_PATH; if(-not $b){$b='herdr'}; $p=((& $b plugin list --json|ConvertFrom-Json).result.plugins|?{$_.plugin_id -eq 'herdr-aa-filetree'}).plugin_root; if($p -and $p.StartsWith('\\?\')){$p=$p.Substring(4)}; & (Join-Path (Join-Path $p 'scripts') 'open-explorer.ps1')''',
]
